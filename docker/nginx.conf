server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Cross-origin isolation — enables SharedArrayBuffer, required by the v86
    # real-Linux engine. Without these the app falls back to the simulated engine.
    add_header Cross-Origin-Opener-Policy same-origin always;
    add_header Cross-Origin-Embedder-Policy require-corp always;

    # SPA fallback — client-side routing (react-router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # The v86 kernel image + bios are large; cache aggressively.
    location /v86/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Long cache for hashed assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
